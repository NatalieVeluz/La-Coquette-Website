<div class="header">
  <div class="logo-container">
    <a (click)="goHome()" aria-label="Home">
      <img src="assets/images/logo.jpg" alt="La Coquette logo"
           (load)="onImageLoad($event)"
           (error)="onImageError($event)">
    </a>
  </div>

  <div class="menu-container">
    <button
      class="button1"
      *ngFor="let menu of menus"
      type="button"
      (click)="onMenuClick(menu)">
      {{ menu.name }}
    </button>
  </div>
</div>
